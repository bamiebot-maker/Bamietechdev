<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="675" gradientUnits="userSpaceOnUse">
      <stop stop-color="#061429"/>
      <stop offset="0.55" stop-color="#101a3a"/>
      <stop offset="1" stop-color="#180f2f"/>
    </linearGradient>
    <linearGradient id="accent" x1="300" y1="250" x2="900" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#20E3B2"/>
      <stop offset="1" stop-color="#2CCCFF"/>
    </linearGradient>
    <linearGradient id="cta" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FF4D4D"/>
      <stop offset="1" stop-color="#FFB347"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="24" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>
  </defs>

  <rect width="1200" height="675" rx="28" fill="url(#bg)"/>
  <circle cx="210" cy="100" r="180" fill="#2CCCFF" fill-opacity="0.1"/>
  <circle cx="980" cy="560" r="220" fill="#FF4D4D" fill-opacity="0.1"/>

  <rect x="120" y="110" width="960" height="455" rx="26" fill="#0A1430" fill-opacity="0.86" stroke="#24325E"/>

  <g filter="url(#glow)">
    <rect x="480" y="270" width="240" height="150" rx="75" fill="url(#accent)"/>
    <rect x="440" y="320" width="320" height="70" rx="35" fill="url(#accent)"/>
    <circle cx="520" cy="350" r="14" fill="#0A1430"/>
    <circle cx="680" cy="350" r="14" fill="#0A1430"/>
    <rect x="585" y="330" width="30" height="8" rx="4" fill="#0A1430"/>
    <rect x="596" y="318" width="8" height="30" rx="4" fill="#0A1430"/>
    <circle cx="655" cy="335" r="7" fill="#0A1430"/>
    <circle cx="675" cy="355" r="7" fill="#0A1430"/>
  </g>

  <text x="600" y="190" text-anchor="middle" fill="#DDF3FF" font-family="'Space Grotesk', Arial, sans-serif" font-size="42" font-weight="700">Push or Pass</text>
  <text x="600" y="230" text-anchor="middle" fill="#8AA1C8" font-family="'Space Grotesk', Arial, sans-serif" font-size="22">Community game where votes shape tomorrow’s challenge</text>

  <rect x="455" y="465" width="290" height="62" rx="31" fill="url(#cta)"/>
  <text x="600" y="505" text-anchor="middle" fill="#120B16" font-family="'Space Grotesk', Arial, sans-serif" font-size="27" font-weight="700">Vote. Play. Repeat.</text>
</svg>
