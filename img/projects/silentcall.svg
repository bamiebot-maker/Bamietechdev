<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">SilentCall Thumbnail</title>
  <desc id="desc">Neon communication-themed thumbnail for SilentCall project.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050814"/>
      <stop offset="55%" stop-color="#121a3d"/>
      <stop offset="100%" stop-color="#290f36"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e8ff"/>
      <stop offset="100%" stop-color="#6b6dff"/>
    </linearGradient>
    <linearGradient id="tag" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#29ffd3"/>
      <stop offset="100%" stop-color="#46a8ff"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>
  <circle cx="180" cy="120" r="220" fill="#00f0ff" opacity="0.08"/>
  <circle cx="1080" cy="560" r="260" fill="#ff2f8a" opacity="0.08"/>

  <g opacity="0.45">
    <path d="M0 460 Q 180 380 320 460 T 640 460 T 960 460 T 1200 460" fill="none" stroke="#2be4ff" stroke-width="3"/>
    <path d="M0 500 Q 220 430 380 500 T 720 500 T 1080 500 T 1200 500" fill="none" stroke="#4f82ff" stroke-width="2"/>
  </g>

  <g transform="translate(600 320)">
    <circle r="188" fill="none" stroke="url(#ring)" stroke-width="2" opacity="0.42"/>
    <circle r="142" fill="none" stroke="url(#ring)" stroke-width="2" opacity="0.7"/>
    <circle r="95" fill="none" stroke="url(#ring)" stroke-width="3" filter="url(#softGlow)"/>

    <rect x="-62" y="-96" width="124" height="192" rx="28" fill="#090f22" stroke="#7b9bff" stroke-width="3"/>
    <rect x="-46" y="-74" width="92" height="138" rx="14" fill="#121f45"/>
    <circle cx="0" cy="78" r="8" fill="#6ea5ff"/>

    <path d="M-15 -8 c12 18 26 31 44 41 l14 -20 c4 -6 11 -8 18 -4 l22 12 c8 5 11 16 6 24 l-17 28 c-5 8 -15 12 -24 9 c-40 -12 -77 -39 -109 -82 c-32 -42 -47 -86 -46 -128 c0 -10 6 -19 15 -23 l30 -12 c9 -3 19 0 24 9 l16 27 c4 8 2 17 -5 23 l-19 15 c3 20 12 39 31 61 z"
      fill="url(#tag)" opacity="0.95"/>
  </g>

  <g transform="translate(94 118)">
    <rect x="0" y="0" width="196" height="40" rx="20" fill="rgba(8,16,36,0.72)" stroke="#2be4ff" stroke-opacity="0.5"/>
    <text x="98" y="26" fill="#91efff" font-family="Space Grotesk, Arial, sans-serif" font-size="18" text-anchor="middle" font-weight="700">Building</text>
  </g>

  <text x="90" y="585" fill="#eef4ff" font-family="Chakra Petch, Arial, sans-serif" font-size="82" font-weight="700" letter-spacing="1">SilentCall</text>
  <text x="92" y="634" fill="#a8b8dc" font-family="Space Grotesk, Arial, sans-serif" font-size="31">Privacy-first communication platform with encrypted flows.</text>
</svg>
